# Base case: simple lump-sum, no complications
# $10,000 lump sum, 18-year horizon, 75% qualified use probability

tax_profile:
  ordinary_income_rate: 0.24
  ltcg_rate: 0.15
  qualified_dividend_rate: 0.15

portfolio_assumptions:
  annual_return: 0.07
  dividend_yield: 0.015
  qualified_dividend_share: 0.95
  turnover_realization_rate: 0.05

qtp_assumptions: {}

scenario_policy:
  leftover_resolution: withdraw_nonqualified
  qualified_use_probability: 0.75

qtp_contributions:
  items:
    - date: "2025-01-01"
      amount: 10000
      account_type: qtp

taxable_contributions:
  items:
    - date: "2025-01-01"
      amount: 10000
      account_type: taxable

education_schedule:
  items:
    - date: "2043-09-01"
      qualified_expense: 40000

horizon_years: 18

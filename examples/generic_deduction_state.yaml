# State with income tax deduction on 529 contributions
# $10,000 lump sum investment, 18-year horizon

tax_profile:
  ordinary_income_rate: 0.24
  ltcg_rate: 0.15
  qualified_dividend_rate: 0.15
  niit_rate: 0.0
  state_ordinary_rate: 0.05
  state_cap_gains_rate: 0.05

portfolio_assumptions:
  annual_return: 0.07
  dividend_yield: 0.015
  qualified_dividend_share: 0.95
  turnover_realization_rate: 0.05
  expense_ratio: 0.001

qtp_assumptions:
  state_tax_deduction_rate: 0.05
  state_tax_credit_rate: 0.00
  state_tax_recapture_rate: 0.05
  roth_rollover_enabled: false
  beneficiary_change_allowed: true

scenario_policy:
  leftover_resolution: withdraw_nonqualified
  qualified_use_probability: 0.80

qtp_contributions:
  items:
    - date: "2025-01-01"
      amount: 10000
      account_type: qtp

taxable_contributions:
  items:
    - date: "2025-01-01"
      amount: 10000
      account_type: taxable

education_schedule:
  items:
    - date: "2043-09-01"
      qualified_expense: 40000

horizon_years: 18
